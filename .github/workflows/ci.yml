name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: civicmirror_test
          POSTGRES_USER: civicmirror
          POSTGRES_PASSWORD: civicmirror
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgres://civicmirror:civicmirror@localhost:5432/civicmirror_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      CELERY_TASK_ALWAYS_EAGER: "True"
      DJANGO_SECRET_KEY: ci-test-secret-key-not-used-in-prod
      CIVICMIRROR_API_KEY: ci-test-api-key
      INTERNAL_TASK_TOKEN: ci-test-task-token

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements/*.txt

      - name: Install dependencies
        run: pip install -r requirements/base.txt -r requirements/dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Django system check
        run: python manage.py check

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: python -m pytest -v --tb=short
