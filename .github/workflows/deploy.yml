name: Deploy to Cloud Run

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGION: us-central1
  AR_REPO: civicmirror-images
  IMAGE_NAME: api
  API_SERVICE: civicmirror-api
  WORKER_SERVICE: civicmirror-worker

jobs:
  # ── Build & push Docker image ───────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      # Pass only the SHA so the image URL can be reconstructed without embedding a secret
      sha: ${{ github.sha }}

    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" ./backend
          docker push "$IMAGE"

  # ── Run migrations ──────────────────────────────────────────────────────────
  migrate:
    name: Run Migrations
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Update migration job image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha }}"
          gcloud run jobs update civicmirror-migrate \
            --image="$IMAGE" \
            --region="${{ env.REGION }}"

      - name: Execute migrations
        run: |
          gcloud run jobs execute civicmirror-migrate \
            --region="${{ env.REGION }}" \
            --wait

  # ── Deploy API service ──────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API
    needs: [build, migrate]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Deploy API service
        id: deploy
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha }}"
          PROJECT_NUMBER=$(gcloud projects describe ${{ secrets.GCP_PROJECT_ID }} --format='value(projectNumber)')
          SERVICE_URL="https://${{ env.API_SERVICE }}-${PROJECT_NUMBER}.${{ env.REGION }}.run.app"
          echo "service_url=${SERVICE_URL}" >> $GITHUB_OUTPUT
          gcloud run deploy ${{ env.API_SERVICE }} \
            --region="${{ env.REGION }}" \
            --image="$IMAGE" \
            --service-account="cloudrun-runtime@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --allow-unauthenticated \
            --ingress=all \
            --min-instances=0 \
            --max-instances=3 \
            --cpu=1 \
            --memory=512Mi \
            --concurrency=80 \
            --timeout=300 \
            --cpu-boost \
            --vpc-connector="projects/${{ secrets.GCP_PROJECT_ID }}/locations/${{ env.REGION }}/connectors/civicmirror-connector" \
            --vpc-egress=private-ranges-only \
            --add-cloudsql-instances="${{ secrets.GCP_PROJECT_ID }}:${{ env.REGION }}:civicmirror-db" \
            --set-env-vars="^|^DJANGO_SETTINGS_MODULE=config.settings.prod|FRONTEND_BASE_URL=https://civicmirror.welshrd.com|CORS_ALLOWED_ORIGINS=https://civicmirror.welshrd.com|GUNICORN_WORKERS=2|DJANGO_ALLOWED_HOSTS=api.civicmirror.welshrd.com,.run.app,localhost|SCHEDULER_OIDC_AUDIENCE=${SERVICE_URL}|SCHEDULER_SA_EMAIL=cloudrun-runtime@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --set-secrets="DATABASE_URL=DATABASE_URL:latest,DJANGO_SECRET_KEY=DJANGO_SECRET_KEY:latest,REDIS_URL=REDIS_URL:latest,OPENSTATES_API_KEY=OPENSTATES_API_KEY:latest,FEC_API_KEY=FEC_API_KEY:latest,CIVIC_API_KEY=CIVIC_API_KEY:latest,INTERNAL_TASK_TOKEN=INTERNAL_TASK_TOKEN:latest,CIVICMIRROR_API_KEY=CIVICMIRROR_API_KEY:latest" \
            --quiet

      - name: Update Cloud Scheduler job URIs
        run: |
          NEW_BASE="${{ steps.deploy.outputs.service_url }}"
          SA="cloudrun-runtime@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

          gcloud scheduler jobs update http sync-openstates \
            --location="${{ env.REGION }}" \
            --uri="${NEW_BASE}/internal/tasks/sync-openstates/" \
            --oidc-service-account-email="$SA" \
            --oidc-token-audience="$NEW_BASE" \
            --quiet

          gcloud scheduler jobs update http poll-pending-results \
            --location="${{ env.REGION }}" \
            --uri="${NEW_BASE}/internal/tasks/poll-results/" \
            --oidc-service-account-email="$SA" \
            --oidc-token-audience="$NEW_BASE" \
            --quiet

          gcloud scheduler jobs update http sync-fec \
            --location="${{ env.REGION }}" \
            --uri="${NEW_BASE}/internal/tasks/sync-fec/" \
            --oidc-service-account-email="$SA" \
            --oidc-token-audience="$NEW_BASE" \
            --quiet

          gcloud scheduler jobs update http sync-sc-vrems \
            --location="${{ env.REGION }}" \
            --uri="${NEW_BASE}/internal/tasks/sync-sc-vrems/" \
            --oidc-service-account-email="$SA" \
            --oidc-token-audience="$NEW_BASE" \
            --quiet

          gcloud scheduler jobs update http sync-ia-sos \
            --location="${{ env.REGION }}" \
            --uri="${NEW_BASE}/internal/tasks/sync-ia-sos/" \
            --oidc-service-account-email="$SA" \
            --oidc-token-audience="$NEW_BASE" \
            --quiet

          gcloud scheduler jobs update http sync-co-sos \
            --location="${{ env.REGION }}" \
            --uri="${NEW_BASE}/internal/tasks/sync-co-sos/" \
            --oidc-service-account-email="$SA" \
            --oidc-token-audience="$NEW_BASE" \
            --quiet

  # ── Update sync-elections Cloud Run Job ─────────────────────────────────────
  update-sync-elections-job:
    name: Update sync-elections job
    needs: [build, migrate]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Update sync-elections job image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha }}"
          gcloud run jobs update civicmirror-sync-elections \
            --image="$IMAGE" \
            --region="${{ env.REGION }}" \
            --quiet

  # ── Deploy Worker service ───────────────────────────────────────────────────
  deploy-worker:
    name: Deploy Worker
    needs: [build, migrate]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Deploy Worker service
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha }}"
          gcloud run deploy ${{ env.WORKER_SERVICE }} \
            --region="${{ env.REGION }}" \
            --image="$IMAGE" \
            --args=worker \
            --service-account="cloudrun-runtime@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --min-instances=1 \
            --max-instances=3 \
            --cpu=1 \
            --memory=512Mi \
            --no-allow-unauthenticated \
            --ingress=internal \
            --add-cloudsql-instances="${{ secrets.GCP_PROJECT_ID }}:${{ env.REGION }}:civicmirror-db" \
            --vpc-connector="projects/${{ secrets.GCP_PROJECT_ID }}/locations/${{ env.REGION }}/connectors/civicmirror-connector" \
            --vpc-egress=private-ranges-only \
            --set-env-vars="DJANGO_SETTINGS_MODULE=config.settings.prod" \
            --set-secrets="DATABASE_URL=DATABASE_URL:latest,REDIS_URL=REDIS_URL:latest,DJANGO_SECRET_KEY=DJANGO_SECRET_KEY:latest,OPENSTATES_API_KEY=OPENSTATES_API_KEY:latest,FEC_API_KEY=FEC_API_KEY:latest,CIVIC_API_KEY=CIVIC_API_KEY:latest,INTERNAL_TASK_TOKEN=INTERNAL_TASK_TOKEN:latest" \
            --quiet
