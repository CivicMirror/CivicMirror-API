name: Deploy to Cloud Run

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  AR_REPO: civicmirror-images
  IMAGE_NAME: backend
  API_SERVICE: civicmirror-backend
  WORKER_SERVICE: civicmirror-worker

jobs:
  # ── Build & push Docker image ───────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}

    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        id: image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" ./backend
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  # ── Run migrations ──────────────────────────────────────────────────────────
  migrate:
    name: Run Migrations
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Update migration job image
        run: |
          gcloud run jobs update civicmirror-migrate \
            --image="${{ needs.build.outputs.image }}" \
            --region="${{ env.REGION }}"

      - name: Execute migrations
        run: |
          gcloud run jobs execute civicmirror-migrate \
            --region="${{ env.REGION }}" \
            --wait

  # ── Deploy API service ──────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API
    needs: [build, migrate]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Deploy API service
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.API_SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ needs.build.outputs.image }}

  # ── Deploy Worker service ───────────────────────────────────────────────────
  deploy-worker:
    name: Deploy Worker
    needs: [build, migrate]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Deploy Worker service
        run: |
          gcloud run deploy ${{ env.WORKER_SERVICE }} \
            --region="${{ env.REGION }}" \
            --image="${{ needs.build.outputs.image }}" \
            --command="/app/docker-entrypoint.sh,worker" \
            --service-account="cloudrun-runtime@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --min-instances=1 \
            --max-instances=3 \
            --cpu=1 \
            --memory=512Mi \
            --no-allow-unauthenticated \
            --ingress=internal \
            --vpc-connector="projects/${{ env.PROJECT_ID }}/locations/${{ env.REGION }}/connectors/civicmirror-connector" \
            --vpc-egress=private-ranges-only \
            --set-env-vars="DJANGO_SETTINGS_MODULE=config.settings.prod" \
            --set-secrets="DATABASE_URL=DATABASE_URL:latest,REDIS_URL=REDIS_URL:latest,DJANGO_SECRET_KEY=DJANGO_SECRET_KEY:latest,OPENSTATES_API_KEY=OPENSTATES_API_KEY:latest,FEC_API_KEY=FEC_API_KEY:latest,CIVIC_API_KEY=CIVIC_API_KEY:latest,INTERNAL_TASK_TOKEN=INTERNAL_TASK_TOKEN:latest" \
            --quiet
