line-length = 120
target-version = "py313"

[lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",  # line too long — handled by formatter
    "F401",  # unused imports in __init__.py re-exports
]
exclude = ["*/migrations/*", ".venv", "build"]

[lint.per-file-ignores]
"*/__init__.py" = ["F401"]
"config/settings/*.py" = ["F401", "F403", "F405"]
